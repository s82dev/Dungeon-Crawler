<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Dungeon Editor V2</title>

<link rel="stylesheet" href="editor.css">

</head>

<body>

<div id="toolbar">

<h2>TOOLS</h2>

<div class="tool" data-tool="wall">
WALL
</div>

<div class="tool" data-tool="lava">
LAVA
</div>

<div class="tool" data-tool="chest">
CHEST
</div>

<div class="tool" data-tool="door">
DOOR
</div>

<div class="tool" data-tool="spawner">
SPAWNER
</div>

<button id="export">
EXPORT
</button>

<button id="import">
IMPORT
</button>

<input type="file" id="fileInput">

</div>

<div id="properties">

<h2>PROPERTIES</h2>

<div id="selectedName">
NONE
</div>

<label>
<input type="checkbox" id="solid">
SOLID
</label>

<label>
<input type="checkbox" id="hurt">
HURT
</label>

<label>
<input type="checkbox" id="passthrough">
PASSTHROUGH
</label>

<label>
<input type="checkbox" id="loot">
CHEST
</label>

<label>
<input type="checkbox" id="mob">
MOB SPAWNER
</label>

</div>

<canvas id="game"></canvas>

<script src="editor.js"></script>

</body>

</html>
